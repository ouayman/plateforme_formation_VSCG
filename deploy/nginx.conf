# Rate limit basique sur auth
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

upstream vscg_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name formation.valuestream-consulting.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name formation.valuestream-consulting.com;

    # Certbot remplit ces lignes après : certbot --nginx -d formation.valuestream-consulting.com
    # ssl_certificate /etc/letsencrypt/live/formation.valuestream-consulting.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/formation.valuestream-consulting.com/privkey.pem;

    client_max_body_size 25M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location /_next/static/ {
        proxy_pass http://vscg_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /branding/ {
        proxy_pass http://vscg_app;
        add_header Cache-Control "public, max-age=86400";
    }

    location /api/health {
        proxy_pass http://vscg_app;
        access_log off;
    }

    location ~ ^/api/auth/(send-otp|verify-otp) {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://vscg_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://vscg_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
